services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - TST_DOMAIN=${TST_DOMAIN}
    depends_on:
      - app

  app:
    image: ghcr.io/ricardoafo/amg-saas-factory:${IMAGE_TAG:-tst}
    restart: unless-stopped
    env_file: .env.tst
    expose:
      - "3000"
    depends_on:
      - pocketbase

  pocketbase:
    build:
      context: .
      dockerfile: Dockerfile.pocketbase
    image: amg-pocketbase:0.28.1
    restart: unless-stopped
    expose:
      - "8090"
    volumes:
      - pb_data:/pb/pb_data

volumes:
  caddy_data:
  caddy_config:
  pb_data:
