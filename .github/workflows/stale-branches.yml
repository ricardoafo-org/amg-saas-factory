name: Stale branches

# Reports remote branches with no commits in the last 60 days that don't
# have an open PR. Does NOT delete — surfaces a list in the run summary
# so the user can review and prune manually. Auto-delete is intentionally
# avoided: a branch can be stale-yet-load-bearing (long-lived feature
# branches like feat/backend-foundation) and an automated rm is too
# blunt for solo-dev judgment calls.
#
# Trigger: monthly + manual.

on:
  schedule:
    - cron: '0 8 1 * *'  # 1st of each month, 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  list:
    name: List stale branches
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          fetch-depth: 0

      - name: Compute stale list
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          THRESHOLD_DAYS=60
          NOW=$(date +%s)
          THRESHOLD=$((NOW - THRESHOLD_DAYS * 86400))

          # Branches we never want flagged regardless of age.
          PROTECTED='^(main|feat/backend-foundation)$'

          # PR-bearing branches — never flag while a PR is open.
          PR_BRANCHES=$(gh pr list --state=open --json headRefName --jq '.[].headRefName' | sort -u || true)

          {
            echo "## Stale branches (no commits in last $THRESHOLD_DAYS days, no open PR)"
            echo ""
            echo "Run \`git push origin --delete <branch>\` to remove. Verify each entry — solo-dev intent matters."
            echo ""
            echo "| Branch | Age (days) | Last commit |"
            echo "|---|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"

          found=0
          for branch in $(git for-each-ref --format='%(refname:short)' refs/remotes/origin/ | grep -v 'origin/HEAD'); do
            short="${branch#origin/}"
            if [[ "$short" =~ $PROTECTED ]]; then continue; fi
            if echo "$PR_BRANCHES" | grep -qx "$short"; then continue; fi
            last_commit=$(git log -1 --format=%ct "$branch" 2>/dev/null || echo 0)
            if [[ "$last_commit" -lt "$THRESHOLD" ]]; then
              age_days=$(( (NOW - last_commit) / 86400 ))
              date_iso=$(git log -1 --format=%cI "$branch" 2>/dev/null || echo unknown)
              echo "| \`$short\` | $age_days | $date_iso |" >> "$GITHUB_STEP_SUMMARY"
              found=1
            fi
          done

          if [[ "$found" -eq 0 ]]; then
            echo "No stale branches found." >> "$GITHUB_STEP_SUMMARY"
          fi
