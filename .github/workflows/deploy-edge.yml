name: CD edge

# Edge router CD — manual only.
#
# Pushes infra/Caddyfile.edge + infra/docker-compose.edge.yml to /srv/amg-edge
# on the tst VPS and reloads the edge stack.
#
# Use this when:
#   - Adding/removing a host block in Caddyfile.edge (e.g. a new tenant subdomain)
#   - Switching ACME between staging and production for cert troubleshooting
#   - Bumping the caddy image version
#
# DO NOT use for routine tst or pro app deploys — those flow through deploy-tst.yml
# and deploy-pro.yml respectively. The edge is independent of inner-stack lifecycles.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are we redeploying the edge?'
        required: true
        type: string

concurrency:
  group: deploy-edge
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-edge:
    name: Push edge config and reload
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Echo reason
        run: echo "Edge redeploy reason: ${{ github.event.inputs.reason }}"

      - name: Sync edge files to tst VPS
        env:
          SSH_KEY: ${{ secrets.TST_SSH_KEY }}
          SSH_HOST: ${{ secrets.TST_SSH_HOST }}
          SSH_USER: ${{ secrets.TST_SSH_USER }}
        run: |
          set -euo pipefail
          KEY_FILE=$(mktemp)
          trap 'rm -f $KEY_FILE' EXIT
          echo "$SSH_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          scp -i "$KEY_FILE" -o StrictHostKeyChecking=accept-new \
            infra/docker-compose.edge.yml \
            infra/Caddyfile.edge \
            scripts/deploy-edge.sh \
            "$SSH_USER@$SSH_HOST:/srv/amg-edge/"

      - name: Reload edge stack
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.TST_SSH_HOST }}
          username: ${{ secrets.TST_SSH_USER }}
          key: ${{ secrets.TST_SSH_KEY }}
          script: |
            set -euo pipefail
            chmod +x /srv/amg-edge/deploy-edge.sh
            /srv/amg-edge/deploy-edge.sh

      - name: Probe both hostnames after reload
        env:
          TST_DOMAIN: ${{ secrets.TST_DOMAIN }}
          PRO_DOMAIN: ${{ secrets.PRO_DOMAIN }}
        run: |
          set -euo pipefail
          for host in "$TST_DOMAIN" "$PRO_DOMAIN"; do
            if [ -z "$host" ]; then
              echo "Skipping empty host"
              continue
            fi
            echo "Probing https://$host/"
            for attempt in $(seq 1 12); do
              status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "https://$host/" || true)
              if [ "$status" = "200" ] || [ "$status" = "301" ] || [ "$status" = "302" ]; then
                echo "  $host → $status (OK)"
                break
              fi
              if [ "$attempt" = "12" ]; then
                echo "  $host never returned a healthy status (last: $status)"
                exit 1
              fi
              echo "  attempt $attempt/12: $status — retrying"
              sleep 5
            done
          done
