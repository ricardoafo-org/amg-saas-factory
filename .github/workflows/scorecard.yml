name: OSSF Scorecard

# Weekly OpenSSF Scorecard run — measures the repo against the canonical
# supply-chain best-practices checklist (branch protection, signed releases,
# SHA-pinned actions, dangerous workflows, dependency update tooling, etc.).
# Findings publish as a SARIF file to the Security tab and as a public
# scorecard.dev badge.
#
# Permissions intentionally minimal per scorecard-action docs:
#   - security-events: write  (upload SARIF to Code Scanning)
#   - id-token:        write  (publish results to OpenSSF transparency log)
#   - contents:        read   (analyze the repo)
#   - actions:         read   (analyze workflow files)

on:
  branch_protection_rule:
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish to scorecard.dev for the public badge + transparency log.
          publish_results: true

      - name: Upload results artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to GitHub code-scanning dashboard
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: results.sarif
