name: PR size

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  size:
    runs-on: ubuntu-latest
    steps:
      - name: Compute size + comment + label
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const pr = context.payload.pull_request;
            const lines = (pr.additions || 0) + (pr.deletions || 0);
            const files = pr.changed_files || 0;

            // Bucket: lines OR files — whichever is larger drives the label.
            // Aligned with .github labels (xs/s/m/l/xl).
            function bucket(lines, files) {
              if (lines <= 30   && files <= 3)  return 'xs';
              if (lines <= 150  && files <= 8)  return 's';
              if (lines <= 500  && files <= 20) return 'm';
              if (lines <= 1500 && files <= 40) return 'l';
              return 'xl';
            }
            const size = bucket(lines, files);
            core.notice(`PR size: ${size} (${lines} lines, ${files} files)`);

            // Sync size:* label — remove others, add the current one.
            const all = ['size:xs', 'size:s', 'size:m', 'size:l', 'size:xl'];
            const desired = `size:${size}`;
            const current = (pr.labels || []).map(l => l.name);
            for (const l of all) {
              if (l !== desired && current.includes(l)) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo:  context.repo.repo,
                    issue_number: pr.number,
                    name: l,
                  });
                } catch (e) { /* label not present — ignore */ }
              }
            }
            if (!current.includes(desired)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: pr.number,
                labels: [desired],
              });
            }

            // Sticky warning comment, only when xl AND no override label.
            const override = current.includes('size-override');
            const marker = '<!-- pr-size-warning -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (size === 'xl' && !override) {
              const body = [
                marker,
                '### PR size: **xl** — consider splitting',
                '',
                `- Lines changed: **${lines}** (additions + deletions)`,
                `- Files changed: **${files}**`,
                '',
                'Large PRs are harder to review and revert. If the work cannot be split,',
                'add the `size-override` label to silence this comment with a one-line',
                'justification in the PR description.',
              ].join('\n');
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  issue_number: pr.number,
                  body,
                });
              }
            } else if (existing) {
              // Size dropped below xl or override added — clear the warning.
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                comment_id: existing.id,
              });
            }
