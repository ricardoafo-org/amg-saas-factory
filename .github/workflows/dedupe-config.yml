name: Dedupe config (manual, BUG-017 remediation)

# One-time deduplication for the `config` collection on tst.
#
# Background: BUG-017. Pre-existing duplicate `(tenant_id, key)` rows on the
# tst PB block creation of the UNIQUE index `idx_config_tenant_key`, which in
# turn makes every `main → tst` deploy red at the apply-schema step.
#
# This workflow builds the ops image with the current branch's code, pushes it
# to GHCR as `dedupe-<sha>-ops`, and runs `scripts/dedupe-config.ts` against
# the tst PB inside the existing `amg_default` docker compose network.
#
# Defaults to dry-run. To actually mutate, the operator must:
#   1. Type the literal string `dedupe-tst` in the `confirm` input.
#   2. Set `mode` to `apply`.
#
# After tst is deduped, this workflow is kept in the repo as documented
# remediation. The script is idempotent (a clean DB exits 0).

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "dedupe-tst" to confirm you understand this will run on the tst PB'
        required: true
        type: string
      mode:
        description: 'dry-run reports duplicates only; apply deletes loser rows'
        required: true
        default: 'dry-run'
        type: choice
        options:
          - dry-run
          - apply

permissions:
  contents: read

env:
  IMAGE_REPO: ghcr.io/ricardoafo-org/amg-saas-factory

jobs:
  guard:
    name: Confirmation guard
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Verify confirm string
        run: |
          if [ "${{ inputs.confirm }}" != "dedupe-tst" ]; then
            echo "::error::confirm input must be exactly 'dedupe-tst' (got: '${{ inputs.confirm }}')"
            exit 1
          fi
          echo "Confirmation OK. mode=${{ inputs.mode }}"

  build-ops:
    name: Build ops image
    needs: [guard]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Build and push ops image (dedupe tag)
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: .
          target: ops
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:dedupe-${{ github.sha }}-ops
          cache-from: type=gha,scope=ops
          cache-to: type=gha,mode=max,scope=ops

  run-dedupe:
    name: Run dedupe on tst
    needs: [build-ops]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    environment:
      name: tst
      url: https://tst.178-104-237-14.sslip.io
    steps:
      - name: Pull dedupe image on VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.TST_SSH_HOST }}
          username: ${{ secrets.TST_SSH_USER }}
          key: ${{ secrets.TST_SSH_KEY }}
          script: |
            docker pull ${{ env.IMAGE_REPO }}:dedupe-${{ github.sha }}-ops

      # Mirrors deploy.yml's snapshot pattern: pb_data is a NAMED docker volume
      # (`amg_pb_data`), not a host bind. Mount it RO via alpine and tar it out
      # to /home/deploy/pb-snapshots/. No need to stop pocketbase.
      - name: Snapshot pb_data on VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.TST_SSH_HOST }}
          username: ${{ secrets.TST_SSH_USER }}
          key: ${{ secrets.TST_SSH_KEY }}
          script: |
            set -euo pipefail
            TS=$(date -u +%Y%m%dT%H%M%SZ)
            mkdir -p /home/deploy/pb-snapshots
            docker run --rm \
              -v amg_pb_data:/source:ro \
              -v /home/deploy/pb-snapshots:/dest \
              alpine:3 \
              tar czf /dest/pb-pre-dedupe-${TS}.tar.gz -C /source .
            ls -lh /home/deploy/pb-snapshots/pb-pre-dedupe-${TS}.tar.gz

      - name: Run dedupe-config.ts (${{ inputs.mode }})
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.TST_SSH_HOST }}
          username: ${{ secrets.TST_SSH_USER }}
          key: ${{ secrets.TST_SSH_KEY }}
          script: |
            FLAG=""
            if [ "${{ inputs.mode }}" = "apply" ]; then
              FLAG="--apply"
            fi
            docker run --rm \
              --network amg_default \
              --env-file /srv/amg/.env.tst \
              ${{ env.IMAGE_REPO }}:dedupe-${{ github.sha }}-ops \
              npx tsx scripts/dedupe-config.ts $FLAG
