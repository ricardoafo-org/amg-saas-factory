name: CD

# Continuous Deployment workflow.
#
# Today: auto-deploys to `tst` environment on every push to main.
# Future: will gain `deploy-pro` job (gated by GitHub Environment `pro`
# with required-reviewers + release-tag trigger). See
# docs/decisions/2026-04-27-production-cd-plan.md for the target shape.
#
# Self-validating deploy (added 2026-04-28):
#   1. Builds two images per commit — :sha-XXX (runner) and :sha-XXX-ops
#      (scripts + tests + devDeps). Both pushed to GHCR.
#   2. Snapshots pb_data BEFORE schema apply (rollback safety).
#   3. Applies schema idempotently from the ops image, INSIDE the compose
#      network, BEFORE the runner image is swapped in. Same commit hash
#      drives schema and runtime — version-locked.
#   4. After container swap and health check, runs the schema-contract
#      integration test (ops image) + smoke spec (Playwright on runner
#      against public URL). The schema-contract test is the one that
#      would have caught the 2026-04-26 SEV-1.

on:
  push:
    branches:
      - main

# Serialize deploys: if two PRs land back-to-back, the second waits for the
# first to finish before building+pushing+SSH'ing. cancel-in-progress=false
# because every commit on main MUST land on tst (no skipping intermediate
# revisions). The PR gate already ran type-check + next-build + tests, so
# we no longer duplicate the smoke step here.
concurrency:
  group: deploy-tst
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_REPO: ghcr.io/ricardoafo-org/amg-saas-factory

jobs:
  deploy-tst:
    name: Deploy to tst
    runs-on: ubuntu-latest
    # Tracks this deploy under the `tst` GitHub Environment.
    # Gives the merge queue a "tst deployment must succeed" gate via
    # branch protection's "Require deployments to succeed before merging"
    # — when enabled, no new PR can merge until the previous merge's
    # tst deploy completes successfully. Catches breakage before it
    # cascades through main.
    environment:
      name: tst
      url: https://tst.178-104-237-14.sslip.io

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      # Runner image — Next.js standalone production runtime. Explicit
      # `target: runner` because the Dockerfile now has an `ops` stage
      # AFTER runner; without target, docker would build the last stage.
      - name: Build and push runner image
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: .
          target: runner
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:tst
            ${{ env.IMAGE_REPO }}:sha-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_COMMIT_SHA=${{ github.sha }}
            TENANT_ID=talleres-amg
          cache-from: type=gha
          cache-to: type=gha,mode=max,scope=runner

      # Ops image — same source tree, devDeps included. Used post-deploy
      # for apply-schema, seed-tenant, and the schema-contract integration
      # test. Same SHA suffix as the runner so the artifacts are version-
      # locked: the schema applied is the schema this deploy expects.
      - name: Build and push ops image
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: .
          target: ops
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:tst-ops
            ${{ env.IMAGE_REPO }}:sha-${{ github.sha }}-ops
          cache-from: type=gha
          cache-to: type=gha,mode=max,scope=ops

      # Sync infra files from repo to /srv/amg/ on the VPS so any change
      # to compose / Caddyfile / Dockerfile.pocketbase auto-deploys.
      # .env.tst is NOT synced — secrets live on the VPS only.
      - name: Sync infra files to VPS
        env:
          SSH_KEY: ${{ secrets.TST_SSH_KEY }}
          SSH_HOST: ${{ secrets.TST_SSH_HOST }}
          SSH_USER: ${{ secrets.TST_SSH_USER }}
        run: |
          set -euo pipefail
          KEY_FILE=$(mktemp)
          trap 'rm -f $KEY_FILE' EXIT
          echo "$SSH_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          scp -i "$KEY_FILE" -o StrictHostKeyChecking=accept-new \
            infra/docker-compose.tst.yml \
            infra/Caddyfile \
            infra/Dockerfile.pocketbase \
            "$SSH_USER@$SSH_HOST:/srv/amg/"

      # Snapshot pb_data BEFORE schema apply (rollback insurance).
      # 14-snapshot retention (~2 weeks at one deploy/day).
      - name: Snapshot PocketBase data dir
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.TST_SSH_HOST }}
          username: ${{ secrets.TST_SSH_USER }}
          key: ${{ secrets.TST_SSH_KEY }}
          script: |
            set -euo pipefail
            TS=$(date -u +%Y%m%dT%H%M%SZ)
            mkdir -p /home/deploy/pb-snapshots
            docker run --rm \
              -v amg_pb_data:/source:ro \
              -v /home/deploy/pb-snapshots:/dest \
              alpine:3 \
              tar czf /dest/pb-${TS}.tar.gz -C /source .
            ls -1t /home/deploy/pb-snapshots/pb-*.tar.gz | tail -n +15 | xargs -r rm
            ls -lh /home/deploy/pb-snapshots/pb-${TS}.tar.gz

      # Pull ops image once so subsequent docker run steps reuse it locally.
      - name: Pull ops image on VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.TST_SSH_HOST }}
          username: ${{ secrets.TST_SSH_USER }}
          key: ${{ secrets.TST_SSH_KEY }}
          script: |
            docker pull ghcr.io/ricardoafo-org/amg-saas-factory:sha-${{ github.sha }}-ops

      # Idempotent schema apply BEFORE container swap, so the new runner
      # image always starts against the schema it expects. apply-schema.ts
      # exits 0 when in sync; non-zero on drift unless --allow-destructive
      # (which we never pass from CI).
      - name: Apply schema to tst PB
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.TST_SSH_HOST }}
          username: ${{ secrets.TST_SSH_USER }}
          key: ${{ secrets.TST_SSH_KEY }}
          script: |
            docker run --rm \
              --network amg_default \
              --env-file /srv/amg/.env.tst \
              ghcr.io/ricardoafo-org/amg-saas-factory:sha-${{ github.sha }}-ops \
              npx tsx scripts/apply-schema.ts

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.TST_SSH_HOST }}
          username: ${{ secrets.TST_SSH_USER }}
          key: ${{ secrets.TST_SSH_KEY }}
          # Host key pinning intentionally disabled for tst:
          # the appleboy/ssh-action `fingerprint` input expects an SSH key
          # fingerprint (SHA256:...), but the secret we have contains
          # known_hosts file lines — wrong format for this parameter.
          # Track proper host pinning as a pro-only follow-up before pro launch.
          script: /home/deploy/deploy-tst.sh sha-${{ github.sha }}

  # Post-deploy health check — verifies the new image actually came up and
  # is serving the commit we just shipped. Catches failures the static gates
  # can't see: bad env vars, PocketBase unreachable, container crashloop,
  # rollback that didn't trigger. /api/health returns the build-time
  # NEXT_PUBLIC_COMMIT_SHA, so commit mismatch = stale container = red gate.
  #
  # NOTE: /api/health alone is too shallow — it has no app dependencies, so
  # an SSR error or hydration crash on `/` won't fail it. We also probe `/`
  # for SSR markers (length + brand text). Full hydration coverage comes
  # from `smoke-tst` below (Playwright against deployed URL).
  health-check-tst:
    name: Health check tst
    needs: deploy-tst
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TST_BASE_URL: https://tst.178-104-237-14.sslip.io
    steps:
      - name: Probe /api/health until commit matches deployed SHA
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Container can take 20-40s to come up after docker compose up -d.
          # Try for ~2 minutes with 10s spacing — total 12 attempts.
          for attempt in $(seq 1 12); do
            echo "Attempt ${attempt}/12 — GET ${TST_BASE_URL}/api/health"
            response=$(curl --silent --show-error --max-time 10 "${TST_BASE_URL}/api/health" || true)
            if [ -z "${response}" ]; then
              echo "  no response yet"
              sleep 10
              continue
            fi
            echo "  body: ${response}"
            ok=$(echo "${response}" | jq -r '.ok // false')
            commit=$(echo "${response}" | jq -r '.commit // "missing"')
            if [ "${ok}" = "true" ] && [ "${commit}" = "${EXPECTED_SHA}" ]; then
              echo "Healthy. ok=true commit=${commit}"
              exit 0
            fi
            echo "  ok=${ok} commit=${commit} (expected ${EXPECTED_SHA}) — retrying"
            sleep 10
          done
          echo "Health check failed after 12 attempts. Container did not converge on ${EXPECTED_SHA}."
          exit 1

      - name: Probe homepage SSR (catches render errors /api/health misses)
        run: |
          set -euo pipefail
          body=$(curl --silent --show-error --max-time 15 "${TST_BASE_URL}/")
          bytes=${#body}
          echo "Homepage size: ${bytes} bytes"
          if [ "${bytes}" -lt 10000 ]; then
            echo "FAIL: homepage HTML is suspiciously small (<10KB) — likely SSR error page"
            echo "${body}" | head -100
            exit 1
          fi
          if ! echo "${body}" | grep -q "Talleres AMG"; then
            echo "FAIL: homepage HTML does not contain brand marker 'Talleres AMG'"
            exit 1
          fi
          echo "Homepage SSR OK (${bytes} bytes, brand marker present)."

  # Schema contract — proves every required field the app expects actually
  # exists on the live tst PB. Runs from the ops image (same commit as the
  # deploy) inside the compose network, so it talks to the same `pocketbase`
  # service the app does. This is the test that would have caught the
  # 2026-04-26 SEV-1 (`availability_slots` had only `id` field on tst PB).
  schema-contract-tst:
    name: Schema contract test (tst)
    needs: [deploy-tst, health-check-tst]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Run schema-contract integration test from ops image
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.TST_SSH_HOST }}
          username: ${{ secrets.TST_SSH_USER }}
          key: ${{ secrets.TST_SSH_KEY }}
          script: |
            docker run --rm \
              --network amg_default \
              --env-file /srv/amg/.env.tst \
              ghcr.io/ricardoafo-org/amg-saas-factory:sha-${{ github.sha }}-ops \
              npx vitest run --config vitest.integration.config.ts tests/db/schema-contract.integration.test.ts

  # Smoke — end-to-end probe against the public URL. Distinguishes
  # "container is up and SSR works" from "the booking flow actually
  # touches PocketBase and writes a row". Closes the gap between green
  # CI and broken production.
  smoke-tst:
    name: Smoke test against tst URL
    needs: [deploy-tst, health-check-tst]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BASE_URL: https://tst.178-104-237-14.sslip.io
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run smoke spec
        run: npx playwright test --config=playwright.smoke.config.ts
