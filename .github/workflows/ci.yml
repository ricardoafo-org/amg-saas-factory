name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  type-check:
    name: Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run type-check

  next-build:
    name: Next build (catches PageProps / route-level type errors)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # `npm run build:docker` is `next build` only — skips schemas:sync (needs
      # PocketBase, not available in CI). Same command runs inside the deploy
      # Docker stage, so a green run here means tst will deploy.
      - run: npm run build:docker
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test -- --run

  flows-validate:
    name: Validate chatbot flows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run flows:validate

  npm-audit:
    name: npm audit (critical)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Audit production dependencies (fail on critical)
        run: npm audit --omit=dev --audit-level=critical
      - name: Report high-severity findings (informational)
        if: always()
        run: npm audit --omit=dev --audit-level=high || true

  # NOTE: E2E (Playwright) job removed in chore/ci-pipeline-cleanup.
  # Re-introduce it alongside FEAT-036 (QA framework rebuild) when PocketBase
  # seeding + local-green are wired into the CI environment. Tracked there.
