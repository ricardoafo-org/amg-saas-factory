name: CI

# All PR-time gates live in this workflow.
# Branch protection requires a SINGLE status check: `CI success` (the
# wrap-up job at the bottom). Adding a new gate? Add a job + put it in
# `ci-success.needs` — branch protection JSON does not need to change.
#
# Execution order (cheapest first, expensive depends on cheap):
#   Tier 1 — parallel, fast (~30s-2min each):
#     • type-check, lint, flows-validate
#     • pr-template-check, test-deletion-guard  (PR hygiene)
#     • security-gate
#     • npm-audit (informational, NOT in ci-success.needs)
#     • unit-tests
#   Tier 2 — depends on Tier 1, expensive build (~3min):
#     • next-build (needs: type-check, lint — fail fast on style/type errors)
#   Tier 3 — depends on Tier 2, longest (~5-8min):
#     • e2e-smoke (4 shards, needs: next-build)
#     • e2e-admin (currently broken, NOT in ci-success.needs)
#   Wrap-up:
#     • ci-success (needs: all required jobs)
#
# Why ordered: a broken type-check used to run the full 8-minute E2E suite
# before failing. Now it fails in ~30s. Net cost: ~30s extra latency on a
# successful PR; gain: 8 minutes saved on every failed PR.

on:
  pull_request:
    branches: [main]
  # GitHub merge queue creates ephemeral branches (gh-readonly-queue/main/...).
  # Without this trigger, queued PRs hang forever waiting for a check that
  # never runs. See repo Settings → Branches → main → "Require merge queue".
  merge_group:

permissions:
  contents: read  # least-privilege default; jobs that need more (security-gate) opt-in below

# TENANT_ID is required by the app (see src/lib/tenant.ts) — getTenantId()
# throws at module init if unset to prevent silent cross-tenant fallback.
env:
  TENANT_ID: talleres-amg

jobs:
  # ============================================================
  # Quality
  # ============================================================
  type-check:
    name: Type check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run type-check

  next-build:
    name: Next build
    needs: [type-check, lint]  # Tier 2 — fail fast on style/type errors before paying for build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # `npm run build:docker` is `next build` only — skips schemas:sync (needs
      # PocketBase, not available in CI). Same command runs inside the deploy
      # Docker stage, so a green run here means tst will deploy.
      - run: npm run build:docker
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Coverage thresholds enforced by vitest.config.ts (ADR-005-rev2 §3.1).
      # Ratchet floors only — never lower them without an ADR amendment.
      - run: npm test -- --run --coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-unit
          path: coverage/
          retention-days: 7

  flows-validate:
    name: Validate chatbot flows
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run flows:validate

  # ============================================================
  # Integration — boots ephemeral PocketBase, applies schemas,
  # runs schema-contract + tenant-isolation specs against the
  # live API. Closes the "tests green, prod broken" gap that
  # caused the 2026-04-26 SEV-1 (per FEAT-052).
  # ============================================================
  integration-tests:
    name: Integration tests (PocketBase)
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    env:
      TENANT_ID: talleres-amg
      POCKETBASE_URL: http://127.0.0.1:8090
      PB_BOOTSTRAP_EMAIL: ci-superuser@amg-test.local
      PB_BOOTSTRAP_PASSWORD: CiSuperuserPassword123!
      POCKETBASE_ADMIN_EMAIL: ci-superuser@amg-test.local
      POCKETBASE_ADMIN_PASSWORD: CiSuperuserPassword123!
      STAFF_OWNER_EMAIL: admin@amg-test.local
      STAFF_OWNER_PASSWORD: TestPassword123!
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Cache PocketBase binary
        id: pb-cache
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ./pocketbase
          key: pocketbase-0.28.1-${{ runner.os }}-${{ runner.arch }}

      - name: Download PocketBase (cache miss)
        if: steps.pb-cache.outputs.cache-hit != 'true'
        run: bash scripts/setup-pocketbase.sh

      - name: Boot PocketBase + create superuser
        # Point PB at an empty migrations dir so it does NOT auto-apply the
        # legacy pb_migrations/*.js — those hardcode env-specific collection
        # IDs (pbc_1720224894 etc.) and crash on a fresh CI PB. Schema is
        # applied below via scripts/apply-schema.ts (FEAT-052 source of truth).
        # pb_migrations/ deletion is scheduled for Week 5 cutover.
        #
        # --dev enables DEBUG log level + per-request HTTP access log. Without
        # it, PB stays silent and a 200+empty body (the symptom we hit on
        # 2026-04-28 with appointments POST) gives no signal of what went
        # wrong server-side. Cost is ~1 MB of extra log; gain is observability.
        run: |
          mkdir -p .pb-empty-migrations
          ./pocketbase superuser upsert "$PB_BOOTSTRAP_EMAIL" "$PB_BOOTSTRAP_PASSWORD"
          ./pocketbase serve --http=127.0.0.1:8090 --migrationsDir=.pb-empty-migrations --dev > pb.log 2>&1 &
          echo $! > pb.pid
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8090/api/health >/dev/null 2>&1; then
              echo "PocketBase ready"
              exit 0
            fi
            sleep 1
          done
          echo "::error::PocketBase failed to start"
          tail -n 50 pb.log || true
          exit 1

      - name: Apply schemas (FEAT-052 source of truth)
        run: npx tsx scripts/apply-schema.ts

      - name: Seed tenant fixture
        run: npx tsx scripts/seed-tenant.ts

      - name: Run integration suite
        run: npm run test:integration

      # Dump live PB state regardless of test outcome. When a test fails or
      # skips for inscrutable reasons (e.g. PB returns 200+empty body), this
      # snapshot — collection definitions + sample records for the tables
      # that participate in the integration suite — is the artifact reviewers
      # need to diagnose without a local repro.
      - name: Dump live PB state (always)
        if: always()
        run: |
          set +e
          mkdir -p pb-debug
          TOKEN=$(curl -fsS -X POST http://127.0.0.1:8090/api/collections/_superusers/auth-with-password \
            -H "Content-Type: application/json" \
            -d "{\"identity\":\"$PB_BOOTSTRAP_EMAIL\",\"password\":\"$PB_BOOTSTRAP_PASSWORD\"}" \
            | jq -r '.token // empty')
          if [[ -n "$TOKEN" ]]; then
            curl -fsS -H "Authorization: Bearer $TOKEN" \
              "http://127.0.0.1:8090/api/collections?perPage=200" \
              > pb-debug/collections.json 2>pb-debug/collections.err
            for col in tenants staff appointments availability_slots services customers vehicles; do
              curl -fsS -H "Authorization: Bearer $TOKEN" \
                "http://127.0.0.1:8090/api/collections/${col}/records?perPage=200" \
                > "pb-debug/${col}-records.json" 2>"pb-debug/${col}-records.err"
            done
          else
            echo "Could not auth to PB to dump state — see pb.log" > pb-debug/auth-failed.txt
          fi
          exit 0

      - name: Stop PocketBase
        if: always()
        run: if [[ -f pb.pid ]]; then kill "$(cat pb.pid)" 2>/dev/null || true; fi

      # Always upload the diagnostic bundle (PB log + live state snapshot).
      # Was previously failure-only — that hid the diagnostic on the skip
      # path that occurs when seed setup silently 200+empties out (the bug
      # this PR exists to debug).
      - name: Upload PocketBase diagnostic bundle (always)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pocketbase-debug-integration
          path: |
            pb.log
            pb-debug/
          retention-days: 7
          if-no-files-found: warn

  # ============================================================
  # Security
  # ============================================================
  # Codifies HIGH/CRITICAL findings (tenant-isolation IDOR, filter injection,
  # hardcoded secrets) and compliance (LOPDGDD, IVA, tenant data) so violations
  # are caught BEFORE merge. PR scope: changed TS/TSX. Merge queue: full src/.
  security-gate:
    name: Security gate
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write  # posts failure comment via github-script
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          fetch-depth: 0  # need history to diff against base for PR scope

      - name: Determine changed files (PR scope)
        id: changed
        if: github.event_name == 'pull_request'
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          files=$(git diff --name-only "$base" "$head" -- 'src/**/*.ts' 'src/**/*.tsx' | tr '\n' ' ')
          echo "files=$files" >> "$GITHUB_OUTPUT"
          echo "Changed TS/TSX files: $files"

      - name: Run security gate (PR — changed files only)
        if: github.event_name == 'pull_request'
        run: |
          if [[ -z "${{ steps.changed.outputs.files }}" ]]; then
            echo "No TS/TSX changed — gate skipped."
            exit 0
          fi
          bash scripts/ci-security-gate.sh --files "${{ steps.changed.outputs.files }}"

      - name: Run security gate (merge queue — full src/ scan)
        if: github.event_name == 'merge_group'
        run: bash scripts/ci-security-gate.sh

      - name: Comment summary on PR (on failure)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const body = [
              '### Security Gate FAILED',
              '',
              'One or more deterministic security checks blocked this PR.',
              'See the **Security gate** job log above for the file:line breakdown.',
              '',
              'These checks codify HIGH/CRITICAL findings (tenant isolation, filter injection, hardcoded secrets) and compliance rules (LOPDGDD, IVA, tenant data).',
              'Run them locally with:',
              '',
              '```sh',
              'bash scripts/ci-security-gate.sh',
              '```',
              '',
              'Do not bypass this gate without a documented exception in the PR description.',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  # ============================================================
  # Castilian Spanish lint — voseo + LatAm lexicon in shipping copy.
  # ============================================================
  # Memory rule: AMG product copy ships in Castilian (tú/tienes/coche/ordenador).
  # Rioplatense voseo (vos/tenés/querés) is dev-personality only, never user-facing.
  # Deterministic grep gate so a future regression cannot quietly ship.
  castilian-lint:
    name: Castilian Spanish lint
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          fetch-depth: 0  # need history to diff against base for PR scope

      - name: Determine changed files (PR scope)
        id: changed
        if: github.event_name == 'pull_request'
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          files=$(git diff --name-only "$base" "$head" -- \
            'src/app/**' 'src/core/**' 'src/emails/**' 'src/lib/chatbot/**' \
            'public/**' 'clients/**' | tr '\n' ' ')
          echo "files=$files" >> "$GITHUB_OUTPUT"
          echo "Changed copy files: $files"

      - name: Run Castilian lint (PR — changed files only)
        if: github.event_name == 'pull_request'
        run: |
          if [[ -z "${{ steps.changed.outputs.files }}" ]]; then
            echo "No copy files changed — gate skipped."
            exit 0
          fi
          bash scripts/lint-castilian-spanish.sh --files "${{ steps.changed.outputs.files }}"

      - name: Run Castilian lint (merge queue — full shipping scan)
        if: github.event_name == 'merge_group'
        run: bash scripts/lint-castilian-spanish.sh

  # ============================================================
  # PR hygiene
  # ============================================================
  # Validates PR body has Summary, Spec Deviations, Reviewer Reports, etc.
  # Skips dependabot (it uses its own template). Skips merge_group (no body).
  #
  # CRITICAL: dependabot guard MUST use pull_request.user.login, NOT
  # github.actor. github.actor flips to "github-actions[bot]" on synchronize
  # events (rebases) and the check would false-fail. See PR #97.
  pr-template-check:
    name: PR template
    runs-on: ubuntu-24.04
    if: >-
      github.event_name == 'merge_group' ||
      (github.event.pull_request.user.login != 'dependabot[bot]'
       && github.event.pull_request.user.login != 'dependabot-preview[bot]')
    steps:
      - name: Skip on merge queue (PR description was already validated)
        if: github.event_name == 'merge_group'
        run: echo "merge_group event — PR template was validated when the PR was opened. Passing through."

      - name: Validate PR description
        if: github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const required = [
              { heading: '## Summary',              label: 'Summary' },
              { heading: '## Spec Deviations',      label: 'Spec Deviations' },
              { heading: '## Reviewer Reports',     label: 'Reviewer Reports' },
              { heading: '## Auto-merge',           label: 'Auto-merge' },
              { heading: '## Quality gates',        label: 'Quality gates' },
              { heading: '## Manual verification',  label: 'Manual verification' },
              { heading: '## Regression test',      label: 'Regression test' },
            ];

            const missing = [];
            const empty   = [];

            for (const section of required) {
              const idx = body.indexOf(section.heading);
              if (idx === -1) {
                missing.push(section.label);
                continue;
              }

              const after = body.slice(idx + section.heading.length);
              const nextHeadingIdx = after.search(/\n##\s/m);
              const sectionBody = (nextHeadingIdx === -1 ? after : after.slice(0, nextHeadingIdx)).trim();

              const stripped = sectionBody.replace(/<!--[\s\S]*?-->/g, '').trim();

              if (stripped.length === 0) {
                empty.push(section.label);
              }
            }

            if (missing.length === 0 && empty.length === 0) {
              core.info('PR template — all required sections present and non-empty.');
              return;
            }

            const lines = [
              '### PR template check FAILED',
              '',
              'The PR description is missing required structure. Update the PR body so it follows `.github/pull_request_template.md`.',
              '',
            ];
            if (missing.length > 0) {
              lines.push(`Missing sections: ${missing.map(s => '`' + s + '`').join(', ')}`);
            }
            if (empty.length > 0) {
              lines.push(`Empty sections (write \`None\` if there is nothing to report): ${empty.map(s => '`' + s + '`').join(', ')}`);
            }
            lines.push('');
            lines.push('This check exists because PRs without explicit Spec Deviations and Reviewer Reports lead to incidents like the FEAT-031 filter-injection that auto-merged before review.');

            core.setFailed(lines.join('\n'));

  # Fails (CI red, blocks merge) if any *.test.ts|tsx or *.spec.ts|tsx file is
  # DELETED in a PR without an accompanying docs/specs/FEAT-XXX*.md change.
  # Uses --name-status so renames (R) are NOT treated as deletions (D).
  test-deletion-guard:
    name: Test deletion guard
    runs-on: ubuntu-24.04
    steps:
      - name: Skip on merge queue (deletion guard ran when the PR was opened)
        if: github.event_name == 'merge_group'
        run: echo "merge_group event — test deletions were validated when the PR was opened. Passing through."

      - name: Checkout repository
        if: github.event_name == 'pull_request'
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          fetch-depth: 0  # diff against base

      - name: Detect deleted test files and require spec change
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail

          BASE_REF="${{ github.base_ref }}"
          echo "Base ref: $BASE_REF"

          git fetch origin "$BASE_REF" --depth=1

          DIFF=$(git diff --name-status "origin/${BASE_REF}...HEAD")
          echo "--- diff (name-status) ---"
          echo "$DIFF"
          echo "---"

          DELETED_TESTS=$(echo "$DIFF" \
            | grep -E '^D\s+.*\.(test|spec)\.(ts|tsx)$' \
            | awk '{print $2}' \
            || true)

          if [ -z "$DELETED_TESTS" ]; then
            echo "No test files deleted in this PR. Guard passed."
            exit 0
          fi

          echo "Deleted test files found:"
          echo "$DELETED_TESTS"

          SPEC_CHANGES=$(echo "$DIFF" \
            | grep -E '\bdocs/specs/FEAT-[0-9]+[^[:space:]]*\.md$' \
            | awk '{print $2}' \
            || true)

          if [ -z "$SPEC_CHANGES" ]; then
            echo ""
            echo "============================================================"
            echo "ERROR: Test deletion without a spec change."
            echo ""
            echo "The following test file(s) were deleted in this PR:"
            echo "$DELETED_TESTS" | sed 's/^/  - /'
            echo ""
            echo "Deleting a test file requires an accompanying change to a"
            echo "docs/specs/FEAT-XXX*.md file that documents why the test"
            echo "is being retired (e.g. FEAT-099-retire-foo.md)."
            echo ""
            echo "If you renamed the test file, verify the rename was committed"
            echo "as a git rename (R status) rather than a delete+add pair."
            echo "============================================================"
            exit 1
          fi

          echo "Spec change(s) found alongside test deletion — guard passed."
          echo "Spec files changed:"
          echo "$SPEC_CHANGES" | sed 's/^/  - /'
          exit 0

  # ============================================================
  # New code needs test — block PRs that touch high-risk paths
  # (src/actions, src/lib) without any test change. Escape hatch:
  # apply the `no-test-required` label with a justified PR body.
  # Codifies the rubric lesson from the 2026-04-26 SEV-1.
  # ============================================================
  new-code-needs-test:
    name: New code needs test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Skip on merge queue (validated at PR time)
        if: github.event_name == 'merge_group'
        run: echo "merge_group event — gate already validated on PR. Passing through."

      - name: Checkout repository
        if: github.event_name == 'pull_request'
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          fetch-depth: 0

      - name: Run gate
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          bash scripts/check-new-code-needs-test.sh \
            --base-sha "$base" \
            --head-sha "$head" \
            --label-list "${PR_LABELS}"

  # ============================================================
  # E2E
  # ============================================================
  # E2E smoke (Playwright). Sharded 4× for parallelism (~16x on GH-hosted
  # 4-CPU runners with workers=100% per shard). Runs tests/e2e/smoke.spec.ts
  # + tests/e2e/regression/.
  e2e-smoke:
    name: E2E smoke (shard ${{ matrix.shard }}/4)
    needs: next-build  # Tier 3 — don't burn 4×8min runners if build is broken
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Run smoke + regression suites
        run: |
          npx playwright test \
            tests/e2e/smoke.spec.ts \
            tests/e2e/regression/ \
            --project=chromium \
            --shard=${{ matrix.shard }}/4
      # Always upload Playwright artifacts. With trace=retain-on-failure
      # (Playwright default), test-results/ only contains traces+videos for
      # the failed/retried attempts. `if: always()` + `if-no-files-found:
      # ignore` means a green run uploads nothing (no waste) and any flake
      # or failure leaves a downloadable trace bundle for diagnosis.
      - name: Upload Playwright trace bundle (always)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-trace-shard-${{ matrix.shard }}
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

  # E2E admin (Playwright + seeded PocketBase). DISABLED until admin login is
  # fixed in Week 2 of FEAT-053. While red, this job stalled the auto-merge
  # flow even though it isn't in ci-success.needs (queued PRs waited on its
  # completion). Re-enabling this job is an explicit Acceptance Criterion of
  # the FEAT-053 admin-login fix — flip `if: false` back to its old form
  # AND re-add `e2e-admin` to ci-success.needs in the same PR.
  e2e-admin:
    name: E2E admin
    if: false  # disabled — see FEAT-053 AC for re-enablement
    needs: next-build  # Tier 3
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      TENANT_ID: talleres-amg
      POCKETBASE_URL: http://127.0.0.1:8090
      POCKETBASE_ADMIN_EMAIL: ci-superuser@amg-test.local
      POCKETBASE_ADMIN_PASSWORD: CiSuperuserPassword123!
      STAFF_OWNER_EMAIL: admin@amg-test.local
      STAFF_OWNER_PASSWORD: TestPassword123!
      TEST_ADMIN_EMAIL: admin@amg-test.local
      TEST_ADMIN_PASSWORD: TestPassword123!
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Boot + seed PocketBase
        run: bash scripts/ci-seed-pocketbase.sh
      - name: Run admin specs
        run: |
          npx playwright test \
            tests/e2e/admin-auth.spec.ts \
            tests/e2e/admin-today.spec.ts \
            tests/e2e/admin-quotes.spec.ts \
            --project=chromium
      - name: Stop PocketBase
        if: always()
        run: |
          if [[ -f pb.pid ]]; then kill "$(cat pb.pid)" 2>/dev/null || true; fi
      - name: Upload PocketBase log (always)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pocketbase-log
          path: pb.log
          retention-days: 7
          if-no-files-found: ignore
      - name: Upload Playwright trace bundle (always)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-trace-admin
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

  # ============================================================
  # Informational (NOT in ci-success.needs — does not block merge)
  # ============================================================
  npm-audit:
    name: npm audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Audit production dependencies (fail on critical)
        run: npm audit --omit=dev --audit-level=critical
      - name: Report high-severity findings (informational)
        if: always()
        run: npm audit --omit=dev --audit-level=high || true

  # PR labeler — auto-applies area:* labels based on changed paths
  # (per .github/labeler.yml config). Was a separate workflow file
  # (labeler.yml); folded here to reduce sidebar noise.
  # Skips on merge_group events (no PR ref, nothing to label).
  auto-label:
    name: Auto-label PRs
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5.0.0
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true

  # PR size — applies size:xs/s/m/l/xl label and posts a sticky warning
  # on xl PRs. Was a separate workflow file (pr-size.yml); folded here.
  pr-size:
    name: PR size
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Compute size + comment + label
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const pr = context.payload.pull_request;
            const lines = (pr.additions || 0) + (pr.deletions || 0);
            const files = pr.changed_files || 0;

            // Bucket: lines OR files — whichever is larger drives the label.
            // Aligned with .github labels (xs/s/m/l/xl).
            function bucket(lines, files) {
              if (lines <= 30   && files <= 3)  return 'xs';
              if (lines <= 150  && files <= 8)  return 's';
              if (lines <= 500  && files <= 20) return 'm';
              if (lines <= 1500 && files <= 40) return 'l';
              return 'xl';
            }
            const size = bucket(lines, files);
            core.notice(`PR size: ${size} (${lines} lines, ${files} files)`);

            // Sync size:* label — remove others, add the current one.
            const all = ['size:xs', 'size:s', 'size:m', 'size:l', 'size:xl'];
            const desired = `size:${size}`;
            const current = (pr.labels || []).map(l => l.name);
            for (const l of all) {
              if (l !== desired && current.includes(l)) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo:  context.repo.repo,
                    issue_number: pr.number,
                    name: l,
                  });
                } catch (e) { /* label not present — ignore */ }
              }
            }
            if (!current.includes(desired)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: pr.number,
                labels: [desired],
              });
            }

            // Sticky warning comment, only when xl AND no override label.
            const override = current.includes('size-override');
            const marker = '<!-- pr-size-warning -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (size === 'xl' && !override) {
              const body = [
                marker,
                '### PR size: **xl** — consider splitting',
                '',
                `- Lines changed: **${lines}** (additions + deletions)`,
                `- Files changed: **${files}**`,
                '',
                'Large PRs are harder to review and revert. If the work cannot be split,',
                'add the `size-override` label to silence this comment with a one-line',
                'justification in the PR description.',
              ].join('\n');
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  issue_number: pr.number,
                  body,
                });
              }
            } else if (existing) {
              // Size dropped below xl or override added — clear the warning.
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                comment_id: existing.id,
              });
            }

  # Dependency review — blocks PRs that introduce dependencies with known
  # high-severity vulnerabilities or incompatible licenses. Free for public
  # repos. Skips on merge_group (already validated when PR was opened).
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  # Semgrep SAST — pattern-based static analysis with curated OSS rule packs.
  # Complements CodeQL (semantic dataflow) with style + language-specific
  # bug detection. Non-blocking initially (continue-on-error) so the first
  # rollout doesn't drown the queue in legacy findings; tighten once the
  # baseline is clean.
  semgrep:
    name: Semgrep SAST
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - name: Run semgrep ci
        run: semgrep ci --config=p/default --config=p/javascript --config=p/typescript --config=p/owasp-top-ten --config=p/security-audit
        continue-on-error: true

  # ============================================================
  # Wrap-up — single required status check for branch protection
  # ============================================================
  # Status check aggregation pattern (GitHub-recommended for matrix builds
  # and any CI with many parallel jobs). Branch protection requires only
  # `CI success`; this job reports green only if every upstream job in
  # `needs:` succeeded.
  #
  # To add a new required gate: add a job above + add it to `needs:`.
  # No branch protection JSON edit required.
  ci-success:
    name: CI success
    needs:
      - type-check
      - next-build
      - lint
      - unit-tests
      - flows-validate
      - integration-tests
      - security-gate
      - castilian-lint
      - pr-template-check
      - test-deletion-guard
      - new-code-needs-test
      - e2e-smoke
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Verify all required jobs succeeded
        env:
          NEEDS_RESULTS: ${{ toJson(needs) }}
        run: |
          set -euo pipefail
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]] \
             || [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more required jobs failed or were cancelled."
            echo "Job results:"
            echo "${NEEDS_RESULTS}"
            exit 1
          fi
          echo "All required jobs passed."
