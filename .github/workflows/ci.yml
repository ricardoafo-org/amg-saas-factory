name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  type-check:
    name: Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run type-check

  next-build:
    name: Next build (catches PageProps / route-level type errors)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # `npm run build:docker` is `next build` only — skips schemas:sync (needs
      # PocketBase, not available in CI). Same command runs inside the deploy
      # Docker stage, so a green run here means tst will deploy.
      - run: npm run build:docker
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test -- --run

  flows-validate:
    name: Validate chatbot flows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run flows:validate

  npm-audit:
    name: npm audit (critical)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Audit production dependencies (fail on critical)
        run: npm audit --omit=dev --audit-level=critical
      - name: Report high-severity findings (informational)
        if: always()
        run: npm audit --omit=dev --audit-level=high || true

  # E2E smoke (Playwright) — Phase 5 of FEAT-041.
  # Runs e2e/smoke.spec.ts — a curated suite written against the current DOM
  # (post-FEAT-038/039) covering: brand title, hero copy, contact channels
  # (WhatsApp + tel:), FAB reachability, services grid, ITV calculator inputs,
  # Visit Google Maps URL contract.
  # The legacy specs (itv.spec.ts, homepage.spec.ts, mobile.spec.ts) are
  # test.describe.skip()'d because they target a pre-redesign UI — rewrite is
  # tracked as task #80 (homepage/itv) and task #79 (mobile contact bar).
  # Booking happy path + footer click-every-CTA need seeded PocketBase —
  # task #78 (CI/CD P0.5).
  #
  # Sharding: 4 parallel jobs × workers=100% per shard (≈16x parallelism on
  # GH-hosted 4-CPU runners). Per FEAT-041 Layer 6 parallelism contract.
  e2e-smoke:
    name: E2E smoke (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Run smoke suite
        run: |
          npx playwright test \
            e2e/smoke.spec.ts \
            --project=chromium \
            --shard=${{ matrix.shard }}/4
      - name: Upload trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace-shard-${{ matrix.shard }}
          path: test-results/
          retention-days: 7

