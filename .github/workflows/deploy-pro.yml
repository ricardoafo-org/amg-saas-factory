name: CD pro

# Production CD — manual trigger with a human approval gate.
#
# Mirrors deploy.yml (tst) gate-for-gate so a release on pro provides the
# same correctness signal as a deploy on tst:
#   build-runner + build-ops (parallel) → deploy-vps (gated by `pro` env
#   reviewer approval) → health-check → schema-contract → smoke → confirm-pro
#
# The ONLY differences vs tst:
#   - Trigger is manual or release tag, not push to main.
#   - deploy-vps carries `environment: pro`, which (once the Environment is
#     configured in repo settings) requires admin reviewer approval before
#     the deploy job can start AND shows up under Deployments → pro.
#   - SSH targets use PRO_* secrets and /srv/amg-pro/ paths.
#
# When a release-branch flow with `required_deployments: [pro]` is added
# later, split this into two environments (`pro-approval` for the gate,
# `pro` for the post-success marker on a confirm job). Single-env is the
# right call until then.
#
# FAKE-PRO MODE (FEAT-057, current state):
#   This workflow runs end-to-end against a fake-pro stack colocated on the
#   tst VPS, behind a shared edge router. PRO_SSH_HOST/USER/KEY point at the
#   tst VPS; PRO_DOMAIN = pro.<host>.sslip.io. See docs/runbooks/fake-pro-bootstrap.md.
#
# Bootstrap checklist for fake-pro (one-time, see runbook for detail):
#   1. SSH to tst VPS, run the fake-pro-bootstrap runbook (creates amg_edge
#      network, brings up edge + pro stacks).
#   2. Create `pro` GitHub Environment (Settings → Environments → New):
#        - Required reviewer: ricardoafo
#        - Deployment branches and tags: Selected → main
#   3. Add Environment secrets to the `pro` env (Settings → Environments →
#      pro → Add environment secret):
#        - PRO_SSH_KEY  = same value as TST_SSH_KEY
#        - PRO_SSH_HOST = same value as TST_SSH_HOST
#        - PRO_SSH_USER = same value as TST_SSH_USER
#        - PRO_DOMAIN   = pro.<host>.sslip.io
#   4. Drop sealed .env.pro on the VPS at /srv/amg-pro/.env.pro (mode 600).
#   5. First run: `gh workflow run deploy-pro.yml` and approve in `pro`.
#
# REAL-PRO-DAY DELTA (when the real pro VPS arrives):
#   - Flip PRO_SSH_HOST to the real pro host (other PRO_* secrets too).
#   - Flip PRO_DOMAIN to the real prod domain.
#   - Revert pro stack to standalone TLS: re-add caddy `ports: 80/443`,
#     drop `amg_edge` network, re-enable `auto_https` in Caddyfile.pro.
#   - Remove `pro.*` block from infra/Caddyfile.edge on tst VPS.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to deploy (defaults to release tag or sha-<commit>)'
        required: false
        type: string

# Serialize pro deploys — only one in flight at a time.
concurrency:
  group: deploy-pro
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE_REPO: ghcr.io/ricardoafo-org/amg-saas-factory
# PRO_* secrets live on the `pro` Environment (Settings → Environments → pro
# → Environment secrets). Only jobs with `environment: pro` can read them,
# and the env's branch restriction means feature-branch / fork PR workflows
# can't read them at all. Tighter blast radius than repo-level secrets.

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Build phase — runner + ops images in parallel, tagged for pro.
  # ─────────────────────────────────────────────────────────────────────

  build-runner:
    name: Build runner image (pro)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Build and push runner image
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: .
          target: runner
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:pro
            ${{ env.IMAGE_REPO }}:sha-${{ github.sha }}-pro
          build-args: |
            NEXT_PUBLIC_COMMIT_SHA=${{ github.sha }}
            TENANT_ID=talleres-amg
          cache-from: type=gha,scope=runner
          cache-to: type=gha,mode=max,scope=runner

  build-ops:
    name: Build ops image (pro)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Build and push ops image
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: .
          target: ops
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:pro-ops
            ${{ env.IMAGE_REPO }}:sha-${{ github.sha }}-pro-ops
          cache-from: type=gha,scope=ops
          cache-to: type=gha,mode=max,scope=ops

  # ─────────────────────────────────────────────────────────────────────
  # Deploy phase — sequential SSH steps. The `pro` Environment on this
  # job requires an admin reviewer before any step runs (configure in
  # repo Settings → Environments → pro). One env, one gate, one marker.
  # ─────────────────────────────────────────────────────────────────────

  deploy-vps:
    name: Deploy to pro VPS
    needs: [build-runner, build-ops]
    runs-on: ubuntu-latest
    timeout-minutes: 1440  # up to 24h waiting for human approval before deploy
    permissions:
      contents: read
    environment:
      name: pro
      url: https://${{ secrets.PRO_DOMAIN }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Sync infra files to pro VPS
        env:
          SSH_KEY: ${{ secrets.PRO_SSH_KEY }}
          SSH_HOST: ${{ secrets.PRO_SSH_HOST }}
          SSH_USER: ${{ secrets.PRO_SSH_USER }}
        run: |
          set -euo pipefail
          KEY_FILE=$(mktemp)
          trap 'rm -f $KEY_FILE' EXIT
          echo "$SSH_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          scp -i "$KEY_FILE" -o StrictHostKeyChecking=accept-new \
            infra/docker-compose.pro.yml \
            infra/Caddyfile.pro \
            infra/Dockerfile.pocketbase \
            "$SSH_USER@$SSH_HOST:/srv/amg-pro/"

      # Snapshot pb_data BEFORE any schema mutation. 14-snapshot retention.
      - name: Snapshot pro PocketBase data dir
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.PRO_SSH_HOST }}
          username: ${{ secrets.PRO_SSH_USER }}
          key: ${{ secrets.PRO_SSH_KEY }}
          script: |
            set -euo pipefail
            TS=$(date -u +%Y%m%dT%H%M%SZ)
            mkdir -p /home/deploy/pb-snapshots-pro
            docker run --rm \
              -v amg-pro_pb_data:/source:ro \
              -v /home/deploy/pb-snapshots-pro:/dest \
              alpine:3 \
              tar czf /dest/pb-${TS}.tar.gz -C /source .
            ls -1t /home/deploy/pb-snapshots-pro/pb-*.tar.gz | tail -n +15 | xargs -r rm
            ls -lh /home/deploy/pb-snapshots-pro/pb-${TS}.tar.gz

      - name: Pull ops image on pro VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.PRO_SSH_HOST }}
          username: ${{ secrets.PRO_SSH_USER }}
          key: ${{ secrets.PRO_SSH_KEY }}
          script: |
            docker pull ghcr.io/ricardoafo-org/amg-saas-factory:sha-${{ github.sha }}-pro-ops

      - name: Apply schema to pro PB
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.PRO_SSH_HOST }}
          username: ${{ secrets.PRO_SSH_USER }}
          key: ${{ secrets.PRO_SSH_KEY }}
          script: |
            docker run --rm \
              --network amg-pro_default \
              --env-file /srv/amg-pro/.env.pro \
              ghcr.io/ricardoafo-org/amg-saas-factory:sha-${{ github.sha }}-pro-ops \
              npx tsx scripts/apply-schema.ts

      - name: Deploy to pro VPS via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.PRO_SSH_HOST }}
          username: ${{ secrets.PRO_SSH_USER }}
          key: ${{ secrets.PRO_SSH_KEY }}
          script: /home/deploy/deploy-pro.sh sha-${{ github.sha }}

  # ─────────────────────────────────────────────────────────────────────
  # Post-deploy gates — same shape as tst.
  # ─────────────────────────────────────────────────────────────────────

  health-check-pro:
    name: Health check pro
    needs: deploy-vps
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    environment:
      name: pro
      url: https://${{ secrets.PRO_DOMAIN }}
    steps:
      - name: Probe /api/health until commit matches deployed SHA
        env:
          EXPECTED_SHA: ${{ github.sha }}
          PRO_BASE_URL: https://${{ secrets.PRO_DOMAIN }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 24); do
            echo "Attempt ${attempt}/24 — GET ${PRO_BASE_URL}/api/health"
            response=$(curl --silent --show-error --max-time 10 "${PRO_BASE_URL}/api/health" || true)
            if [ -z "${response}" ]; then
              echo "  no response yet"
              sleep 5
              continue
            fi
            ok=$(echo "${response}" | jq -r '.ok // false')
            commit=$(echo "${response}" | jq -r '.commit // "missing"')
            if [ "${ok}" = "true" ] && [ "${commit}" = "${EXPECTED_SHA}" ]; then
              echo "Healthy. ok=true commit=${commit}"
              exit 0
            fi
            echo "  ok=${ok} commit=${commit} (expected ${EXPECTED_SHA}) — retrying"
            sleep 5
          done
          echo "Health check failed after 24 attempts. Container did not converge on ${EXPECTED_SHA}."
          exit 1

      - name: Probe homepage SSR
        env:
          PRO_BASE_URL: https://${{ secrets.PRO_DOMAIN }}
        run: |
          set -euo pipefail
          body=$(curl --silent --show-error --max-time 15 "${PRO_BASE_URL}/")
          bytes=${#body}
          echo "Homepage size: ${bytes} bytes"
          if [ "${bytes}" -lt 10000 ]; then
            echo "FAIL: homepage HTML is suspiciously small (<10KB)"
            exit 1
          fi
          if ! echo "${body}" | grep -q "Talleres AMG"; then
            echo "FAIL: homepage HTML missing brand marker 'Talleres AMG'"
            exit 1
          fi
          echo "Homepage SSR OK (${bytes} bytes, brand marker present)."

  schema-contract-pro:
    name: Schema contract test (pro)
    needs: [deploy-vps, health-check-pro]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    environment:
      name: pro
      url: https://${{ secrets.PRO_DOMAIN }}
    steps:
      - name: Run schema-contract integration test from ops image
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.PRO_SSH_HOST }}
          username: ${{ secrets.PRO_SSH_USER }}
          key: ${{ secrets.PRO_SSH_KEY }}
          script: |
            docker run --rm \
              --network amg-pro_default \
              --env-file /srv/amg-pro/.env.pro \
              ghcr.io/ricardoafo-org/amg-saas-factory:sha-${{ github.sha }}-pro-ops \
              npx vitest run --config vitest.integration.config.ts tests/db/schema-contract.integration.test.ts

  smoke-pro:
    name: Smoke test against pro URL
    needs: [deploy-vps, health-check-pro]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    environment:
      name: pro
      url: https://${{ secrets.PRO_DOMAIN }}
    env:
      BASE_URL: https://${{ secrets.PRO_DOMAIN }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run smoke spec
        run: npx playwright test --config=playwright.smoke.config.ts

      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-smoke-pro-trace
          path: |
            playwright-report/
            test-results/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────
  # confirm-pro — plain aggregator. Single-env model: `pro` env recording
  # already lives on deploy-vps. When release-branch flow with
  # `required_deployments` is added later, move `environment: pro` here
  # and add a separate `pro-approval` env on deploy-vps.
  # ─────────────────────────────────────────────────────────────────────

  confirm-pro:
    name: Confirm pro deployment
    needs: [deploy-vps, health-check-pro, schema-contract-pro, smoke-pro]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      contents: read
    steps:
      - name: Confirm all gates green
        run: |
          echo "✅ Approval recorded"
          echo "✅ Deploy succeeded"
          echo "✅ Health check converged on commit ${{ github.sha }}"
          echo "✅ Schema contract test passed against pro PB"
          echo "✅ Smoke test passed against pro URL"
          echo ""
          echo "pro deployment marked successful."
