name: Deploy to tst

on:
  push:
    branches:
      - main

# Serialize deploys: if two PRs land back-to-back, the second waits for the
# first to finish before building+pushing+SSH'ing. cancel-in-progress=false
# because every commit on main MUST land on tst (no skipping intermediate
# revisions). The PR gate already ran type-check + next-build + tests, so
# we no longer duplicate the smoke step here.
concurrency:
  group: deploy-tst
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    name: Build image · Push GHCR · Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Build and push image
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/ricardoafo-org/amg-saas-factory:tst
            ghcr.io/ricardoafo-org/amg-saas-factory:sha-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_COMMIT_SHA=${{ github.sha }}
            TENANT_ID=talleres-amg
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.TST_SSH_HOST }}
          username: ${{ secrets.TST_SSH_USER }}
          key: ${{ secrets.TST_SSH_KEY }}
          # Host key pinning intentionally disabled for tst:
          # the appleboy/ssh-action `fingerprint` input expects an SSH key
          # fingerprint (SHA256:...), but the secret we have contains
          # known_hosts file lines — wrong format for this parameter.
          # Track proper host pinning as a pro-only follow-up before pro launch.
          script: /home/deploy/deploy-tst.sh sha-${{ github.sha }}

  # Post-deploy health check — verifies the new image actually came up and
  # is serving the commit we just shipped. Catches failures the static gates
  # can't see: bad env vars, PocketBase unreachable, container crashloop,
  # rollback that didn't trigger. /api/health returns the build-time
  # NEXT_PUBLIC_COMMIT_SHA, so commit mismatch = stale container = red gate.
  #
  # NOTE: /api/health alone is too shallow — it has no app dependencies, so
  # an SSR error or hydration crash on `/` won't fail it. We also probe `/`
  # for SSR markers (length + brand text). For full hydration coverage we
  # need Playwright against deployed tst — tracked separately.
  health-check:
    name: Health check (tst)
    needs: build-and-deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TST_BASE_URL: https://tst.178-104-237-14.sslip.io
    steps:
      - name: Probe /api/health until commit matches deployed SHA
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Container can take 20-40s to come up after docker compose up -d.
          # Try for ~2 minutes with 10s spacing — total 12 attempts.
          for attempt in $(seq 1 12); do
            echo "Attempt ${attempt}/12 — GET ${TST_BASE_URL}/api/health"
            response=$(curl --silent --show-error --max-time 10 "${TST_BASE_URL}/api/health" || true)
            if [ -z "${response}" ]; then
              echo "  no response yet"
              sleep 10
              continue
            fi
            echo "  body: ${response}"
            ok=$(echo "${response}" | jq -r '.ok // false')
            commit=$(echo "${response}" | jq -r '.commit // "missing"')
            if [ "${ok}" = "true" ] && [ "${commit}" = "${EXPECTED_SHA}" ]; then
              echo "Healthy. ok=true commit=${commit}"
              exit 0
            fi
            echo "  ok=${ok} commit=${commit} (expected ${EXPECTED_SHA}) — retrying"
            sleep 10
          done
          echo "Health check failed after 12 attempts. Container did not converge on ${EXPECTED_SHA}."
          exit 1

      - name: Probe homepage SSR (catches render errors /api/health misses)
        run: |
          set -euo pipefail
          body=$(curl --silent --show-error --max-time 15 "${TST_BASE_URL}/")
          bytes=${#body}
          echo "Homepage size: ${bytes} bytes"
          if [ "${bytes}" -lt 10000 ]; then
            echo "FAIL: homepage HTML is suspiciously small (<10KB) — likely SSR error page"
            echo "${body}" | head -100
            exit 1
          fi
          if ! echo "${body}" | grep -q "Talleres AMG"; then
            echo "FAIL: homepage HTML does not contain brand marker 'Talleres AMG'"
            exit 1
          fi
          echo "Homepage SSR OK (${bytes} bytes, brand marker present)."
