name: Deploy to tst

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Type-check · Test · Lint · Validate flows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --run

      - name: Validate chatbot flows
        run: npm run flows:validate

  build-and-deploy:
    name: Build image · Push GHCR · Deploy via SSH
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Build and push image
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/ricardoafo-org/amg-saas-factory:tst
            ghcr.io/ricardoafo-org/amg-saas-factory:sha-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_COMMIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        with:
          host: ${{ secrets.TST_SSH_HOST }}
          username: ${{ secrets.TST_SSH_USER }}
          key: ${{ secrets.TST_SSH_KEY }}
          fingerprint: ${{ secrets.TST_KNOWN_HOSTS }}
          script: /home/deploy/deploy-tst.sh sha-${{ github.sha }}
