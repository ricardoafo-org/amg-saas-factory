<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 48" fill="currentColor">
  <!-- Car silhouette icon (side profile, 44px wide) -->
  <g>
    <!-- Car body lower -->
    <path d="M4 31 L4 27 L7 21 L14 17 L28 17 L34 21 L41 21 L43 25 L43 31 Z"/>
    <!-- Car cabin/roof -->
    <path d="M14 17 L17 11 L29 11 L32 17 Z"/>
    <!-- Front wheel arch cutout -->
    <circle cx="12" cy="31" r="5" fill="none" stroke="currentColor" strokeWidth="0"/>
    <path d="M4 31 Q4 36 12 36 Q20 36 20 31 L4 31" style="fill: oklch(0.04 0.04 255)"/>
    <!-- Rear wheel arch cutout -->
    <path d="M27 31 Q27 36 35 36 Q43 36 43 31 L27 31" style="fill: oklch(0.04 0.04 255)"/>
    <!-- Front wheel -->
    <circle cx="12" cy="31" r="4.2" fill="none" stroke="currentColor" strokeWidth="2"/>
    <circle cx="12" cy="31" r="1.5"/>
    <!-- Rear wheel -->
    <circle cx="35" cy="31" r="4.2" fill="none" stroke="currentColor" strokeWidth="2"/>
    <circle cx="35" cy="31" r="1.5"/>
    <!-- Windshield accent line -->
    <line x1="17" y1="17" x2="19" y2="12" stroke="currentColor" strokeWidth="1" opacity="0.4"/>
    <line x1="30" y1="17" x2="28" y2="12" stroke="currentColor" strokeWidth="1" opacity="0.4"/>
    <!-- Headlight -->
    <rect x="41" y="23" width="3" height="3" rx="1" opacity="0.7"/>
  </g>
  <!-- Divider -->
  <line x1="52" y1="8" x2="52" y2="40" stroke="currentColor" strokeWidth="1" opacity="0.2"/>
  <!-- AMG wordmark -->
  <text x="60" y="28" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="20" font-weight="800" letter-spacing="1">AMG</text>
  <!-- TALLERES sub-label -->
  <text x="61" y="40" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="9.5" font-weight="400" letter-spacing="2.5" opacity="0.6">TALLERES</text>
</svg>
