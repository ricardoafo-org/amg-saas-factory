  <g fill="#e11d48">
    <rect x="95" y="36" width="10" height="16" rx="2"/>
    <rect x="95" y="148" width="10" height="16" rx="2"/>
    <rect x="36" y="95" width="16" height="10" rx="2"/>
    <rect x="148" y="95" width="16" height="10" rx="2"/>
    <rect x="57.4" y="46.4" width="10" height="16" rx="2" transform="rotate(-45 62.4 54.4)"/>
    <rect x="121.6" y="128.6" width="10" height="16" rx="2" transform="rotate(-45 126.6 136.6)"/>
    <rect x="46.4" y="121.6" width="16" height="10" rx="2" transform="rotate(-45 54.4 126.6)"/>
    <rect x="128.6" y="57.4" width="16" height="10" rx="2" transform="rotate(-45 136.6 62.4)"/>
